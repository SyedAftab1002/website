<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Your Company</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Your Company</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Get in Touch</h1>
            <p>We'd love to hear from you</p>
        </div>
    </header>

    <section class="features">
        <div class="container">
            <div style="max-width: 600px; margin: 0 auto;">
                <h2 style="text-align: center; margin-bottom: var(--spacing-lg);">Contact Form</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject *</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>

                    <button type="submit" class="cta-button" style="width: 100%; border: none; cursor: pointer;">
                        Send Message
                    </button>
                </form>

                <div id="form-message" style="margin-top: var(--spacing-md); text-align: center;"></div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Your Company. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formMessage = document.getElementById('form-message');

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    formMessage.style.color = 'var(--color-accent)';
                    formMessage.textContent = 'Message sent successfully!';
                    document.getElementById('contact-form').reset();
                } else {
                    formMessage.style.color = '#ef4444';
                    formMessage.textContent = 'Failed to send message. Please try again.';
                }
            } catch (error) {
                formMessage.style.color = '#ef4444';
                formMessage.textContent = 'Error sending message. Please try again.';
            }
        });
    </script>
</body>
</html>
